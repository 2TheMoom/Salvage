<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    width: 280px; margin: 0; padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f11; color: #f2f2f2;
  }
  h1 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
  h1 img { width: 20px; height: 20px; }
  input {
    width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 8px;
    border: 1px solid #333; background: #1a1a1d; color: #f2f2f2; font-size: 13px;
    margin-bottom: 10px;
  }
  #result { font-size: 13px; line-height: 1.5; min-height: 18px; }
  .safe { color: #4ade80; }
  .warn { color: #fb923c; }
  .muted { color: #888; }
  a { color: #93c5fd; }
</style>
</head>
<body>
  <h1><img src="icons/icon48.png" alt="" />Salvage</h1>
  <input id="address" type="text" placeholder="Paste an address to check…" autofocus />
  <div id="result" class="muted">Checks if it's a wallet or a contract.</div>
  <script src="popup.js"></script>
</body>
</html>
